<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CR Report — Secured Viewer</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: Calibri, 'Segoe UI', Arial, sans-serif;
  background: #0D1B2A;
  color: #E0E6EF;
  min-height: 100vh;
}

/* ── Login overlay ── */
#login-screen {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 40% 40%, #1a3a5c 0%, #0D1B2A 70%);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
}
.login-box {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(174,214,241,0.25);
  border-radius: 16px;
  padding: 44px 48px;
  width: 380px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  text-align: center;
}
.login-box .logo { font-size: 42px; margin-bottom: 10px; }
.login-box h2 {
  font-size: 20px; font-weight: 700; color: #AED6F1;
  letter-spacing: 1px; margin-bottom: 6px;
}
.login-box p { font-size: 12px; color: #7FB3D3; margin-bottom: 28px; }
.login-box input {
  width: 100%; padding: 12px 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(174,214,241,0.3);
  border-radius: 8px; color: #fff; font-size: 14px;
  outline: none; margin-bottom: 14px;
  letter-spacing: 2px;
}
.login-box input:focus { border-color: #AED6F1; }
.login-box button {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, #1F4E79, #2F5596);
  border: none; border-radius: 8px;
  color: #fff; font-size: 14px; font-weight: 700;
  cursor: pointer; letter-spacing: 1px;
  transition: opacity 0.2s;
}
.login-box button:hover { opacity: 0.85; }
#login-error {
  margin-top: 14px; font-size: 12px;
  color: #E74C3C; display: none;
}
.login-box .hint {
  margin-top: 18px; font-size: 11px; color: #5D8AA8;
}

/* ── Top bar ── */
#app { display: none; }
.topbar {
  background: linear-gradient(90deg, #1F4E79 0%, #2F5596 55%, #4A235A 100%);
  padding: 11px 24px;
  display: flex; align-items: center; gap: 16px;
  border-bottom: 3px solid #AED6F1;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  flex-wrap: wrap;
}
.topbar h1 { font-size: 17px; font-weight: 700; color: #fff; flex: 1; }
.topbar select {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff; font-size: 13px; font-weight: 600;
  padding: 5px 12px; border-radius: 6px; cursor: pointer;
}
.topbar select option { background: #1F4E79; color: #fff; }
.topbar .badge {
  background: rgba(255,255,255,0.13);
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 20px; padding: 3px 12px;
  font-size: 12px; color: #AED6F1; font-weight: 600;
}
.logout-btn {
  background: rgba(231,76,60,0.25);
  border: 1px solid rgba(231,76,60,0.5);
  color: #E74C3C; font-size: 12px; font-weight: 700;
  padding: 5px 14px; border-radius: 6px; cursor: pointer;
  transition: background 0.2s;
}
.logout-btn:hover { background: rgba(231,76,60,0.45); }

/* ── Tab bar ── */
.tab-bar {
  display: flex; gap: 4px;
  padding: 10px 16px 0;
  background: #122035;
  border-bottom: 2px solid #1F4E79;
  overflow-x: auto;
}
.tab-btn {
  padding: 7px 18px;
  border: none; border-radius: 6px 6px 0 0;
  font-size: 12px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  background: rgba(255,255,255,0.07);
  color: #AED6F1; letter-spacing: 0.4px;
  border-bottom: 3px solid transparent;
  transition: background 0.15s;
}
.tab-btn:hover { background: rgba(255,255,255,0.15); color:#fff; }
.tab-btn.active {
  background: var(--tab-color);
  color: #fff;
  border-bottom: 3px solid #AED6F1;
}

/* ── Content ── */
.content {
  padding: 14px; overflow-x: auto;
}
.tab-pane { display: none; overflow-x: auto; }
.tab-pane.active { display: block; }

/* ── Status bar ── */
#status-bar {
  padding: 8px 24px;
  background: #0a1520;
  font-size: 11px; color: #5D8AA8;
  border-top: 1px solid #1F4E79;
  position: fixed; bottom: 0; left: 0; right: 0;
}

/* ── Loading ── */
#loading {
  display:none; text-align:center;
  padding: 60px; color: #AED6F1; font-size:16px;
}
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="logo">🔐</div>
    <h2>CR Report Viewer</h2>
    <p>Enter your password to access the reports</p>
    <input type="password" id="pwd-input" placeholder="Password"
           onkeydown="if(event.key==='Enter') doLogin()">
    <button onclick="doLogin()">🔓 Unlock Reports</button>
    <div id="login-error">❌ Incorrect password. Please try again.</div>
    <div class="hint">🔒 All data is AES-256 encrypted</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">
  <div class="topbar">
    <h1>📊 CR Daily Report</h1>
    <select id="date-picker" onchange="loadDate(this.value)"></select>
    <span class="badge" id="rec-count"></span>
    <button class="logout-btn" onclick="doLogout()">🔒 Lock</button>
  </div>

  <div class="tab-bar" id="tab-bar"></div>

  <div class="content">
    <div id="loading">⏳ Decrypting report…</div>
    <div id="sheets-container"></div>
  </div>

  <div id="status-bar">🔐 Session active — data decrypted in memory only &nbsp;|&nbsp; Close tab to clear session</div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  Constants
// ══════════════════════════════════════════════════════════
const SHEET_NAMES  = ["Detailed", "BrokerWise", "TraderWise", "Trader-StrategyWise"];
const SHEET_COLORS = {
  "Detailed":            "#1F4E79",
  "BrokerWise":          "#4A235A",
  "TraderWise":          "#006B6B",
  "Trader-StrategyWise": "#1F4E79",
};

// In-memory store: { date -> { sheetName -> htmlString } }
let SESSION = {};
let derivedKey = null;   // CryptoKey — kept in memory for the session

// ══════════════════════════════════════════════════════════
//  Crypto helpers  (AES-256-GCM via SubtleCrypto)
// ══════════════════════════════════════════════════════════
const crypto = window.crypto.subtle;

async function deriveKey(password, salt) {
  const enc  = new TextEncoder();
  const raw  = await crypto.importKey("raw", enc.encode(password),
                 "PBKDF2", false, ["deriveKey"]);
  return crypto.deriveKey(
    { name:"PBKDF2", salt, iterations:310000, hash:"SHA-256" },
    raw,
    { name:"AES-GCM", length:256 },
    false, ["encrypt","decrypt"]
  );
}

async function encrypt(key, plaintext) {
  const iv  = window.crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const buf = await crypto.encrypt({name:"AES-GCM",iv}, key, enc.encode(plaintext));
  return {
    iv:   btoa(String.fromCharCode(...iv)),
    data: btoa(String.fromCharCode(...new Uint8Array(buf))),
  };
}

async function decrypt(key, iv_b64, data_b64) {
  const iv   = Uint8Array.from(atob(iv_b64),  c => c.charCodeAt(0));
  const data = Uint8Array.from(atob(data_b64), c => c.charCodeAt(0));
  const buf  = await crypto.decrypt({name:"AES-GCM",iv}, key, data);
  return new TextDecoder().decode(buf);
}

// ══════════════════════════════════════════════════════════
//  Login / Logout
// ══════════════════════════════════════════════════════════
async function doLogin() {
  const pwd = document.getElementById("pwd-input").value.trim();
  if (!pwd) return;

  // Load records from the embedded JSON store
  let records;
  try {
    records = JSON.parse(document.getElementById("report-store").textContent);
  } catch(e) { records = []; }

  // Find first encrypted record to validate the password against
  const testRec = records.find(r => r.status === "encrypted");
  if (testRec) {
    const salt = Uint8Array.from(atob(testRec.salt), c => c.charCodeAt(0));
    try {
      const key     = await deriveKey(pwd, salt);
      await decrypt(key, testRec.iv, testRec.data);  // throws if wrong password
      derivedKey = key;
    } catch(e) {
      showError(true); return;
    }
  }

  // If all records are still "pending" (first ever unlock), derive key with random salt
  // and we'll encrypt them now
  if (!derivedKey) {
    const salt = window.crypto.getRandomValues(new Uint8Array(16));
    derivedKey = await deriveKey(pwd, salt);
    // Store salt so future logins can re-derive
    window._globalSalt = salt;
  }

  // Encrypt any pending records in memory (does NOT modify the HTML file —
  // that requires a Python re-run; but data is safe in-session)
  for (const rec of records) {
    if (rec.status === "pending") {
      const plain = atob(rec.payload);  // base64 → UTF-8 bytes → string
      const utf8  = decodeURIComponent(escape(plain));
      SESSION[rec.date] = JSON.parse(utf8);
    } else if (rec.status === "encrypted") {
      // Lazily decrypt on demand (in loadDate)
      SESSION[rec.date] = null;  // placeholder
    }
  }

  // Keep encrypted records for lazy decryption
  window._records = records;

  showError(false);
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("app").style.display          = "block";
  buildDatePicker(records);
}

function doLogout() {
  SESSION    = {};
  derivedKey = null;
  window._records = null;
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("app").style.display          = "none";
  document.getElementById("pwd-input").value = "";
  document.getElementById("sheets-container").innerHTML = "";
}

function showError(show) {
  document.getElementById("login-error").style.display = show ? "block" : "none";
}

// ══════════════════════════════════════════════════════════
//  UI — Date picker & tabs
// ══════════════════════════════════════════════════════════
function buildDatePicker(records) {
  const sel = document.getElementById("date-picker");
  sel.innerHTML = "";
  // Most recent first
  const sorted = [...records].sort((a,b) => b.date.localeCompare(a.date));
  sorted.forEach(r => {
    const opt = document.createElement("option");
    const d   = r.date;  // DDMMYYYY
    opt.value = d;
    opt.text  = `${d.slice(0,2)}/${d.slice(2,4)}/${d.slice(4)}`;
    sel.appendChild(opt);
  });
  document.getElementById("rec-count").textContent =
    `${records.length} report${records.length!==1?"s":""} stored`;
  if (sorted.length) loadDate(sorted[0].date);
}

function buildTabs(activeIdx) {
  const bar = document.getElementById("tab-bar");
  bar.innerHTML = "";
  SHEET_NAMES.forEach((name, i) => {
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (i === activeIdx ? " active" : "");
    btn.textContent = name;
    btn.style.setProperty("--tab-color", SHEET_COLORS[name] || "#1F4E79");
    btn.onclick = () => showSheet(i);
    bar.appendChild(btn);
  });
}

function showSheet(idx) {
  document.querySelectorAll(".tab-btn").forEach((b,i) =>
    b.classList.toggle("active", i===idx));
  document.querySelectorAll(".tab-pane").forEach((p,i) =>
    p.classList.toggle("active", i===idx));
}

// ══════════════════════════════════════════════════════════
//  Load a date's report
// ══════════════════════════════════════════════════════════
async function loadDate(date) {
  document.getElementById("loading").style.display = "block";
  document.getElementById("sheets-container").innerHTML = "";

  let sheetsData = SESSION[date];

  // If null it means it's an encrypted record not yet decrypted
  if (sheetsData === null) {
    const rec = (window._records || []).find(r => r.date === date);
    if (rec && rec.status === "encrypted") {
      try {
        const plain = await decrypt(derivedKey, rec.iv, rec.data);
        sheetsData  = JSON.parse(plain);
        SESSION[date] = sheetsData;   // cache for this session
      } catch(e) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("sheets-container").innerHTML =
          '<p style="color:#E74C3C;padding:20px;">⚠ Decryption failed for this record.</p>';
        return;
      }
    }
  }

  if (!sheetsData) {
    document.getElementById("loading").style.display = "none";
    document.getElementById("sheets-container").innerHTML =
      '<p style="color:#E74C3C;padding:20px;">⚠ No data found for this date.</p>';
    return;
  }

  // Build tab panes
  buildTabs(0);
  const container = document.getElementById("sheets-container");
  container.innerHTML = "";
  SHEET_NAMES.forEach((name, i) => {
    const div = document.createElement("div");
    div.className = "tab-pane" + (i===0?" active":"");
    div.id = `pane-${i}`;
    div.innerHTML = sheetsData[name] || "<p style='padding:20px;color:#888'>No data</p>";
    container.appendChild(div);
  });

  document.getElementById("loading").style.display = "none";
}
</script>
